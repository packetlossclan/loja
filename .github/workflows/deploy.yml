name: Deploy Packet Loss Store

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5 
        with:
          node-version: 24.16.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5 
        with:
          version: 11.3.0

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync ansible

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Sync files to VPS via SSH password
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sshpass -e rsync -az --delete \
            -e "ssh -p $VPS_PORT -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.turbo' \
            --exclude '.env.production' \
            ./ "$VPS_USER@$VPS_HOST:$APP_DIR/"

      - name: Run Ansible deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_BECOME_PASSWORD: ${{ secrets.VPS_BECOME_PASSWORD }}
        run: |
          cat > inventory.ini <<INVENTORY
          [loja_prod]
          $VPS_HOST ansible_port=$VPS_PORT ansible_user=$VPS_USER ansible_ssh_pass='$VPS_SSH_PASSWORD' ansible_become_pass='$VPS_BECOME_PASSWORD'

          [all:vars]
          ansible_connection=ssh
          ansible_python_interpreter=/usr/bin/python3
          INVENTORY

          ansible-galaxy collection install community.general

          ansible-playbook \
            -i inventory.ini \
            ansible/playbooks/deploy.yml \
            -e app_dir="$APP_DIR" \
            -e app_user="nginx" \
            -e app_group="nginx" \
            -e app_domain="loja.packetloss.com.br" \
            -e api_domain="api.loja.packetloss.com.br" \
            -e app_title="Packet Loss Store" \
            -e default_region="br"
