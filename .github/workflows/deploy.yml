name: Deploy Packet Loss Store

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: ${{ secrets.VPS_APP_DIR }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install deploy dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass rsync

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Sync files to VPS via SSH password
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sshpass -e rsync -az --delete \
            -e "ssh -p $VPS_PORT -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.next' \
            --exclude '.turbo' \
            --exclude '.env.production' \
            ./ "$VPS_USER@$VPS_HOST:$APP_DIR/"

      - name: Run remote deploy script on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PASSWORD: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_BECOME_PASSWORD: ${{ secrets.VPS_BECOME_PASSWORD }}
        run: |
          sshpass -e ssh -p "$VPS_PORT" -o StrictHostKeyChecking=no "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$APP_DIR' VPS_BECOME_PASSWORD='$VPS_BECOME_PASSWORD' PNPM_BIN='/home/nginx/.local/share/pnpm/pnpm' bash '$APP_DIR/scripts/vps-deploy.sh'"
