packages:
  - "apps/**"
  - "!apps/backend/.medusa/**"
pnpm:
  onlyBuiltDependencies:
    - "@medusajs/telemetry"
    - "@swc/core"
    - esbuild
    - msgpackr-extract
    - protobufjs
    - sharp
    - unrs-resolver
  overrides:
    "@types/react": "19.0.5"
    "@types/react-dom": "19.0.5"
allowBuilds:
  '@medusajs/telemetry': true
  '@swc/core': true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
