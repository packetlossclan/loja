---
- name: Configure and deploy Medusa on Oracle Linux ARM64
  hosts: loja_prod
  become: true
  gather_facts: true

  vars:
    node_version: "24.16.0"
    node_dist: "node-v{{ node_version }}-linux-arm64"
    node_archive: "{{ node_dist }}.tar.xz"
    node_download_url: "https://nodejs.org/dist/v{{ node_version }}/{{ node_archive }}"
    node_install_dir: "/opt/{{ node_dist }}"
    node_bin_dir: "{{ node_install_dir }}/bin"
    node_link_dir: "/usr/local/bin"
    app_env_file: "{{ app_dir }}/.env.production"
    app_user: "nginx"
    app_group: "nginx"
    node_env: "production"
    app_domain: "loja.packetloss.com.br"
    api_domain: "api.loja.packetloss.com.br"
    backend_port: 9000
    storefront_port: 8000
    default_region: "br"
    app_title: "Packet Loss Store"
    nginx_ssl_certificate: "/etc/letsencrypt/live/loja.packetloss.com.br/fullchain.pem"
    nginx_ssl_certificate_key: "/etc/letsencrypt/live/loja.packetloss.com.br/privkey.pem"

  pre_tasks:
    - name: Assert OS family is RedHat-compatible
      ansible.builtin.assert:
        that:
          - ansible_facts["os_family"] == "RedHat"
        fail_msg: "Este playbook foi feito para Oracle Linux/RHEL compatíveis."

  tasks:
    - name: Ensure base packages are installed
      ansible.builtin.dnf:
        name:
          - policycoreutils-python-utils
          - rsync
          - tar
          - xz
          - nginx
        state: present

    - name: Download Node.js ARM64 archive
      ansible.builtin.get_url:
        url: "{{ node_download_url }}"
        dest: "/tmp/{{ node_archive }}"
        mode: "0644"

    - name: Extract Node.js archive
      ansible.builtin.unarchive:
        src: "/tmp/{{ node_archive }}"
        dest: /opt
        remote_src: true
        creates: "{{ node_install_dir }}"

    - name: Symlink node/npm/npx/corepack
      ansible.builtin.file:
        src: "{{ node_bin_dir }}/{{ item }}"
        dest: "{{ node_link_dir }}/{{ item }}"
        state: link
        force: true
      loop:
        - node
        - npm
        - npx
        - corepack

    - name: Enable corepack and activate pnpm 11.3.0
      ansible.builtin.command: corepack prepare pnpm@11.3.0 --activate
      changed_when: false

    - name: Ensure pnpm shim link
      ansible.builtin.file:
        src: "{{ node_bin_dir }}/pnpm"
        dest: "{{ node_link_dir }}/pnpm"
        state: link
        force: true
        follow: false

    - name: Install valkey package
      ansible.builtin.dnf:
        name: valkey
        state: present

    - name: Set cache service name
      ansible.builtin.set_fact:
        redis_service_name: "valkey"

    - name: Ensure redis-like service enabled
      ansible.builtin.systemd:
        name: "{{ redis_service_name }}"
        state: started
        enabled: true

    - name: Ensure app directory exists
      ansible.builtin.file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0755"

    - name: Check if .env.production exists on VPS
      ansible.builtin.stat:
        path: "{{ app_env_file }}"
      register: app_env_file_stat

    - name: Fail when .env.production is missing
      ansible.builtin.assert:
        that:
          - app_env_file_stat.stat.exists
        fail_msg: "Arquivo {{ app_env_file }} não encontrado. Crie-o na VPS antes do deploy."

    - name: Ensure SELinux context for app directory
      community.general.sefcontext:
        target: "{{ app_dir }}(/.*)?"
        setype: usr_t
        state: present

    - name: Restore SELinux context on app directory
      ansible.builtin.command: "restorecon -Rv {{ app_dir }}"
      changed_when: false

    - name: Allow Nginx to proxy to Node ports with SELinux
      ansible.builtin.command: setsebool -P httpd_can_network_connect 1
      changed_when: false

    - name: Load .env.production file from VPS
      ansible.builtin.slurp:
        src: "{{ app_env_file }}"
      register: app_env_raw

    - name: Parse .env.production lines
      ansible.builtin.set_fact:
        app_env_lines: >-
          {{
            (app_env_raw.content | b64decode).splitlines()
            | map('trim')
            | reject('equalto', '')
            | reject('match', '^#')
            | select('search', '=')
            | list
          }}

    - name: Build environment map from .env.production
      ansible.builtin.set_fact:
        app_env: "{{ app_env | default({}) | combine({(item.split('=', 1)[0]): (item.split('=', 1)[1])}) }}"
      loop: "{{ app_env_lines }}"

    - name: Validate required keys in .env.production
      ansible.builtin.assert:
        that:
          - app_env.MEDUSA_DATABASE_URL is defined
          - app_env.MEDUSA_JWT_SECRET is defined
          - app_env.MEDUSA_COOKIE_SECRET is defined
          - app_env.MEDUSA_PUBLISHABLE_KEY is defined
        fail_msg: "Faltam variáveis obrigatórias em {{ app_env_file }}."

    - name: Render backend environment file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/apps/backend/.env"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0600"
        content: |
          STORE_CORS={{ app_env.MEDUSA_STORE_CORS | default('https://loja.packetloss.com.br') }}
          ADMIN_CORS={{ app_env.MEDUSA_ADMIN_CORS | default('https://loja.packetloss.com.br') }}
          AUTH_CORS={{ app_env.MEDUSA_AUTH_CORS | default('https://loja.packetloss.com.br') }}
          REDIS_URL={{ app_env.MEDUSA_REDIS_URL | default('redis://127.0.0.1:6379') }}
          JWT_SECRET={{ app_env.MEDUSA_JWT_SECRET }}
          COOKIE_SECRET={{ app_env.MEDUSA_COOKIE_SECRET }}
          DATABASE_URL={{ app_env.MEDUSA_DATABASE_URL }}
          MERCADOPAGO_ACCESS_TOKEN={{ app_env.MERCADOPAGO_ACCESS_TOKEN | default('') }}
          MERCADOPAGO_WEBHOOK_SECRET={{ app_env.MERCADOPAGO_WEBHOOK_SECRET | default('') }}

    - name: Render storefront environment file
      ansible.builtin.copy:
        dest: "{{ app_dir }}/apps/storefront-v2/.env.local"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0600"
        content: |
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY={{ app_env.MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MEDUSA_BACKEND_URL=https://{{ app_env.API_DOMAIN | default(api_domain) }}
          NEXT_PUBLIC_DEFAULT_REGION={{ app_env.NEXT_PUBLIC_DEFAULT_REGION | default(default_region) }}
          NEXT_PUBLIC_BASE_URL=https://{{ app_domain }}
          NODE_ENV={{ node_env }}

    - name: Ensure SELinux context for backend env file
      community.general.sefcontext:
        target: "{{ app_dir }}/apps/backend/.env"
        setype: etc_t
        state: present

    - name: Ensure SELinux context for storefront env file
      community.general.sefcontext:
        target: "{{ app_dir }}/apps/storefront-v2/.env.local"
        setype: etc_t
        state: present

    - name: Restore SELinux context after env changes
      ansible.builtin.command: "restorecon -Rv {{ app_dir }}"
      changed_when: false

    - name: Ensure Ansible remote tmp base exists
      ansible.builtin.file:
        path: /tmp/.ansible
        state: directory
        mode: "1777"

    - name: Ensure Ansible remote tmp directory exists
      ansible.builtin.file:
        path: /tmp/.ansible/tmp
        state: directory
        mode: "1777"

    - name: Install production dependencies
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.command: pnpm install --frozen-lockfile
      args:
        chdir: "{{ app_dir }}"
      changed_when: false

    - name: Clean previous Next.js cache to reduce disk pressure
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.file:
        path: "{{ app_dir }}/apps/storefront-v2/.next/cache"
        state: absent

    - name: Check free space on app filesystem (KB)
      ansible.builtin.shell: "set -o pipefail && df -Pk {{ app_dir }} | awk 'NR==2 {print $4}'"
      register: app_free_kb
      changed_when: false

    - name: Fail when free disk space is too low for build
      ansible.builtin.assert:
        that:
          - (app_free_kb.stdout | int) > 2097152
        fail_msg: "Espaço insuficiente em disco para build. Livre: {{ app_free_kb.stdout }} KB (mínimo ~2GB)."

    - name: Build workspace
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.command: pnpm build
      args:
        chdir: "{{ app_dir }}"
      changed_when: false

    - name: Render backend production env inside build directory
      ansible.builtin.copy:
        dest: "{{ app_dir }}/apps/backend/.medusa/server/.env.production"
        owner: "{{ app_user }}"
        group: "{{ app_group }}"
        mode: "0600"
        content: |
          STORE_CORS={{ app_env.MEDUSA_STORE_CORS | default('https://loja.packetloss.com.br') }}
          ADMIN_CORS={{ app_env.MEDUSA_ADMIN_CORS | default('https://loja.packetloss.com.br') }}
          AUTH_CORS={{ app_env.MEDUSA_AUTH_CORS | default('https://loja.packetloss.com.br') }}
          REDIS_URL={{ app_env.MEDUSA_REDIS_URL | default('redis://127.0.0.1:6379') }}
          JWT_SECRET={{ app_env.MEDUSA_JWT_SECRET }}
          COOKIE_SECRET={{ app_env.MEDUSA_COOKIE_SECRET }}
          DATABASE_URL={{ app_env.MEDUSA_DATABASE_URL }}
          MERCADOPAGO_ACCESS_TOKEN={{ app_env.MERCADOPAGO_ACCESS_TOKEN | default('') }}
          MERCADOPAGO_WEBHOOK_SECRET={{ app_env.MERCADOPAGO_WEBHOOK_SECRET | default('') }}

    - name: Ensure backend node_modules is available inside build directory
      ansible.builtin.file:
        src: "{{ app_dir }}/apps/backend/node_modules"
        dest: "{{ app_dir }}/apps/backend/.medusa/server/node_modules"
        state: link
        force: true

    - name: Run Medusa database migrations
      become: true
      become_user: "{{ app_user }}"
      ansible.builtin.command: pnpm --filter @dtc/backend exec medusa db:migrate
      args:
        chdir: "{{ app_dir }}"
      changed_when: false

    - name: Check admin build artifact exists
      ansible.builtin.stat:
        path: "{{ app_dir }}/apps/backend/.medusa/server/public/admin/index.html"
      register: admin_index_stat

    - name: Fail when admin build artifact is missing
      ansible.builtin.assert:
        that:
          - admin_index_stat.stat.exists
        fail_msg: "Admin build ausente em .medusa/server/public/admin/index.html"

    - name: Install backend systemd service
      ansible.builtin.template:
        src: "templates/medusa-backend.service.j2"
        dest: /etc/systemd/system/medusa-backend.service
        mode: "0644"

    - name: Install storefront systemd service
      ansible.builtin.template:
        src: "templates/medusa-storefront.service.j2"
        dest: /etc/systemd/system/medusa-storefront.service
        mode: "0644"

    - name: Install nginx vhosts for loja + api
      ansible.builtin.template:
        src: "templates/nginx-loja.conf.j2"
        dest: /etc/nginx/sites.d/08-loja.packetloss.com.br.conf
        mode: "0644"

    - name: Test nginx config
      ansible.builtin.command: nginx -t
      changed_when: false

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and restart backend
      ansible.builtin.systemd:
        name: medusa-backend
        state: restarted
        enabled: true

    - name: Enable and restart storefront
      ansible.builtin.systemd:
        name: medusa-storefront
        state: restarted
        enabled: true

    - name: Enable and reload nginx
      ansible.builtin.systemd:
        name: nginx
        state: reloaded
        enabled: true
